<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Earning App</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 300px; margin: auto; }
        h2 { color: #2ecc71; }
        .balance { font-size: 24px; font-weight: bold; margin: 10px 0; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        .task-list { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Welcome, User!</h3>
        <div class="balance">₹ <span id="points">0</span></div>
        <p>Aapka Total Balance</p>
        <hr>
        
        <div class="task-list">
            <p><strong>Daily Tasks:</strong></p>
            <button onclick="addPoints(5)">Watch Video (+₹5)</button>
            <button onclick="addPoints(2)">Daily Check-in (+₹2)</button>
            <button onclick="withdraw()">Withdraw Money</button>
        </div>
    </div>

    <script>
        let currentPoints = 0;

        function addPoints(amount) {
            currentPoints += amount;
            document.getElementById('points').innerText = currentPoints;
            alert("Badhai ho! Aapne ₹" + amount + " kama liye hain.");
        }

        function withdraw() {
            if(currentPoints >= 100) {
                alert("Withdrawal Request Sent! Aapko paise 24 ghante mein mil jayenge.");
                currentPoints = 0;
                document.getElementById('points').innerText = currentPoints;
            } else {
                alert("Minimum ₹100 chahiye withdraw karne ke liye.");
            }
        }
    </script>

</body>
</html>
